<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Hockey Peak Plan</title>
<style>
:root{--bg:#0a0a0a;--surf:#161616;--surf2:#1f1f1f;--bdr:#272727;--acc:#c8f060;--acc2:#60d4f0;--txt:#f0ece4;--mut:#686868;--mut2:#343434;--done-bg:#1e2d0a;--done-bdr:#3a5214;--tip-bg:#0d1a08;--tip-bdr:#2a4010}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}
.topbar{padding:max(env(safe-area-inset-top),14px) 16px 10px;background:var(--bg);border-bottom:1px solid var(--bdr);flex-shrink:0}
.topbar-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-title{font-size:18px;font-weight:700;color:var(--acc)}
.tourney{font-size:11px;color:var(--mut);border:1px solid var(--bdr);border-radius:4px;padding:3px 8px}
.phase-tabs{display:flex;gap:5px}
.ptab{flex:1;padding:8px 4px;border-radius:7px;border:1px solid var(--bdr);font-size:12px;font-weight:600;text-align:center;color:var(--mut);background:transparent;cursor:pointer;transition:all .15s}
.ptab.active{background:var(--acc);color:#0a0a0a;border-color:var(--acc)}
.subbar{padding:8px 16px;background:var(--bg);border-bottom:1px solid var(--bdr);flex-shrink:0}
.wrow{display:flex;gap:5px;overflow-x:auto;padding-bottom:7px;scrollbar-width:none}
.wrow::-webkit-scrollbar,.drow::-webkit-scrollbar{display:none}
.wtab{flex-shrink:0;padding:5px 11px;border-radius:5px;border:1px solid var(--bdr);font-size:11px;color:var(--mut);background:transparent;cursor:pointer;white-space:nowrap;transition:all .15s}
.wtab.active{border-color:var(--acc2);color:var(--acc2)}
.drow{display:flex;gap:5px;overflow-x:auto;margin-top:6px;scrollbar-width:none}
.daybtn{flex-shrink:0;width:42px;height:50px;border-radius:8px;border:1px solid var(--bdr);background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s}
.daybtn.active{border-color:var(--acc);background:rgba(200,240,96,.07)}
.daybtn.rd{opacity:.3;pointer-events:none}
.daybtn.done{border-color:#6ab020}
.dlbl{font-size:12px;font-weight:600;color:var(--mut)}
.daybtn.active .dlbl{color:var(--acc)}
.daybtn.done .dlbl,.daybtn.done .dpct{color:#8acc30}
.dpct{font-size:10px;color:var(--mut)}
.sa{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:60px}
.shdr{padding:14px 16px 10px;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--bg);z-index:5}
.spill{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:3px;border:1px solid;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase}
.stitle{font-size:22px;font-weight:700;line-height:1.1}
.ssub{font-size:12px;color:var(--mut);margin-top:3px}
.prow{display:flex;align-items:center;gap:10px;margin-top:10px}
.ptrack{flex:1;height:3px;background:var(--mut2);border-radius:2px;overflow:hidden}
.pbar{height:100%;border-radius:2px;transition:width .25s}
.pnum{font-size:11px;color:var(--mut);min-width:36px;text-align:right}
.hnote{margin:10px 16px 0;padding:9px 12px;background:rgba(200,240,96,.05);border:1px solid rgba(200,240,96,.18);border-radius:7px;font-size:12px;color:var(--acc);line-height:1.5}
.sec{padding:0 16px}
.sechdr{font-size:10px;font-weight:600;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);padding:14px 0 7px;display:flex;align-items:center;gap:8px}
.sechdr::after{content:'';flex:1;height:1px;background:var(--bdr)}
.item{border-radius:9px;margin-bottom:5px;border:1px solid var(--bdr);background:var(--surf);overflow:hidden}
.item.ck{background:var(--done-bg);border-color:var(--done-bdr)}
.itop{display:flex;align-items:flex-start;gap:11px;padding:11px 12px;cursor:pointer}
.itop:active{background:rgba(255,255,255,.03)}
.cbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--mut2);flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:13px;transition:all .18s;color:#0a0a0a}
.item.ck .cbox{background:var(--acc);border-color:var(--acc)}
.imid{flex:1;min-width:0}
.iname{font-size:14px;font-weight:500;line-height:1.3;color:var(--txt)}
.item.ck .iname{text-decoration:line-through;color:var(--mut)}
.idet{font-size:12px;color:var(--mut);margin-top:2px;line-height:1.4}
.item.ck .idet{color:var(--mut2)}
.tbtn{margin:0 12px 9px 45px;padding:4px 10px;border-radius:5px;border:1px solid var(--bdr);background:transparent;font-size:11px;color:var(--mut);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.tbtn.open{border-color:var(--acc2);color:var(--acc2)}
.tpanel{display:none;padding:0 12px 11px 12px}
.tpanel.open{display:block}
.tinner{background:var(--tip-bg);border:1px solid var(--tip-bdr);border-radius:7px;padding:10px 12px}
.trow{display:flex;gap:8px;margin-bottom:6px}
.trow:last-child{margin-bottom:0}
.tlbl{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--acc2);flex-shrink:0;padding-top:1px;min-width:52px}
.tlbl.err{color:#f06090}
.ttxt{font-size:12px;color:var(--mut);line-height:1.55}
.cnote{margin:6px 16px 0;padding:11px 13px;background:var(--surf);border-left:2px solid var(--acc2);border-radius:0 7px 7px 0;font-size:12px;color:var(--mut);line-height:1.6}
.cnote b{color:var(--txt);font-weight:500}
.dbanner{margin:14px 16px 0;padding:13px;background:rgba(200,240,96,.08);border:1px solid var(--acc);border-radius:9px;text-align:center;font-size:16px;font-weight:700;color:var(--acc);display:none}
.rscreen{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 28px;text-align:center;gap:10px;min-height:300px}
.rico{font-size:44px;margin-bottom:6px}
.rtitle{font-size:26px;font-weight:700}
.rbody{font-size:13px;color:var(--mut);line-height:1.65;max-width:280px}
.new-badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(240,96,144,.15);border:1px solid rgba(240,96,144,.4);color:#f06090;margin-left:6px;vertical-align:middle;letter-spacing:.04em;text-transform:uppercase}
</style>
</head>

  <div class="topbar">
    <div class="topbar-row">
      <div class="app-title">⚡ Hockey Peak Plan</div>

    </div>
    <div class="phase-tabs" id="ptabs"></div>

  <div class="subbar">
    <div class="wrow" id="wrow"></div>
    <div class="drow" id="drow"></div>

</div>
<script>
var TIPS={
  '90/90 hip stretch':{s:'Sit on floor. Front shin across, back shin to the side. Both knees at 90 degrees.',h:'Sit tall, brace core, lean torso forward over front shin. Keep back straight.',f:'Deep pull in the back hip rotators and front hip flexor.',e:'Don\'t collapse sideways. If your hip floats up, put a folded towel under it.'},
  'Kneeling hip flexor stretch':{s:'Half-kneel: one knee on ground, other foot flat in front. The kneeling side is what you\'re stretching.',h:'FIRST: squeeze the glute of the kneeling leg and tuck your pelvis (posterior tilt). Then shift hips forward gently.',f:'Deep stretch at front of kneeling hip. NOT in your lower back.',e:'Without the glute squeeze and pelvic tuck you are just compressing your lower back. This cue is everything.'},
  'Pigeon pose':{s:'From all fours, bring one shin across the mat. Back leg extends straight behind.',h:'Square hips toward the floor. Breathe into the tension and relax. Let gravity do the work.',f:'Deep in the glute and piriformis of the front leg.',e:'Don\'t let hips rotate sideways. Use a towel under the front hip if it doesn\'t reach the floor.'},
  'Glute bridge 2s hold':{s:'Lie on back, knees bent, feet flat hip-width, arms by sides.',h:'Drive through heels, squeeze glutes hard at top. Hold 2 full seconds. Lower slowly.',f:'Glutes working. Lower back should NOT be arching.',e:'If you feel it in your lower back, you are overextending. Think ribs down, glutes tight — not just push hips up.'},
  'Clamshell':{s:'Lie on side, hips stacked, knees bent 90 degrees, feet together.',h:'Rotate top knee open toward ceiling. Hold 1 second. Lower slowly.',f:'Upper glute (glute medius) on the working side.',e:'Don\'t let your pelvis rock backward. Smaller controlled range beats big cheated range.'},
  '"World\'s greatest" stretch':{s:'Forward lunge position, front foot flat.',h:'Place same-side hand inside your front foot. Rotate opposite arm up to ceiling, follow with eyes. Return and repeat.',f:'Hip flexor of back leg, thoracic spine, hamstring of front leg.',e:'Don\'t rush — this is a movement not a hold. Slow rotation gets the thoracic spine involved.'},
  'Copenhagen adductor plank':{s:'Lie on your side. Top foot rests on a bench or chair at about hip height. Bottom leg hangs.',h:'Lift your hips off the ground using the top leg — your inner thigh does the work. Hold for the prescribed time. Lower slowly.',f:'Inner thigh (adductor) of the top leg. This is a tendon strengthening exercise.',e:'Don\'t let your hips sag or rotate. This is one of the best groin injury prevention exercises for hockey. Start with short holds and build up.'},
  'Isometric hip flexor hold':{s:'Stand on one leg next to a wall for balance.',h:'Drive your free knee up to 90 degrees and hold it there without using your hands. Just your hip flexor holding the position.',f:'Deep hip flexor (psoas) working isometrically — strengthening the tendon in the tight position.',e:'Don\'t lean back to compensate. Stay tall. This directly retrains the psoas to be strong, not just tight.'},
  'Slow eccentric calf raises':{s:'Stand on the edge of a step, both feet to start. Raise up on both feet.',h:'Shift to one foot. Lower your heel down SLOWLY — take 4 full seconds. Raise back up on both feet. Repeat.',f:'Deep calf and Achilles tendon load. This is tendon remodeling work.',e:'The 4 second lowering is the point — don\'t rush it. This protects your Achilles from concrete running stress. If you feel pain in the tendon, reduce range and see a physio.'},
  'Dead bug':{s:'Lie on back, arms pointing to ceiling, knees bent 90 degrees in the air.',h:'Press lower back FLAT into floor — this is the whole exercise. Slowly lower one arm overhead and opposite leg toward floor. Return. Alternate.',f:'Deep core bracing. Lower back stays flat the entire time.',e:'The moment your lower back lifts you have gone too far. Reduce range. Start with just arms, then just legs, then combine.'},
  'Hollow body hold':{s:'Lie on back, arms overhead, legs straight.',h:'Press lower back into floor (posterior pelvic tilt). Lift shoulders and legs off floor. Hold.',f:'Entire anterior core. Lower back flat — non-negotiable.',e:'If lower back arches, bend your knees to make it easier. Never sacrifice the flat back for straighter legs.'},
  'Bird dog':{s:'On all fours, wrists under shoulders, knees under hips. Neutral spine.',h:'Extend one arm forward and opposite leg back simultaneously. Hold 2 seconds. Return slowly.',f:'Core bracing, glute of extended leg, shoulder stability.',e:'Most common mistake: rotating the hips to get the leg higher. Keep hips level — imagine a glass of water on your lower back.'},
  'Posterior tilt plank':{s:'Forearm plank, elbows under shoulders.',h:'Before holding: squeeze glutes and tuck pelvis to flatten your lower back. Now hold that position.',f:'Core bracing. Lower back flat. Not your hip flexors.',e:'If your lower back is arching, your hip flexors have taken over. Drop to knees and reset the pelvic tilt.'},
  'Pallof press':{s:'Stand sideways to cable machine, single handle at chest height. Step away until you feel tension.',h:'Hold handle at chest with both hands. Brace core. Press arms straight out in front. Hold 1-2 seconds. Return.',f:'Obliques and deep core resisting rotation.',e:'Don\'t let your body rotate toward the cable. That rotation is what you are resisting. Go lighter and hold perfect position.'},
  'Farmer carry':{s:'Pick up two heavy dumbbells or kettlebells, one in each hand.',h:'Walk with them. Stay tall — shoulders back and down, core braced, gaze forward. Smooth controlled steps.',f:'Whole body integration — grip, core, traps, glutes, calves all working together.',e:'Don\'t let the weight pull your shoulders down or your torso lean to one side. If it does, lighten the load.'},
  'Suitcase carry':{s:'Pick up ONE heavy dumbbell in one hand only.',h:'Walk while resisting the urge to lean toward the weight. Stay completely upright and level.',f:'Lateral core (obliques and QL) working hard to resist lateral bend — directly trains the core stability you need for hockey.',e:'Don\'t lean away from the weight either. Completely neutral upright posture is the goal. Switch hands each set.'},
  'Barbell back squat':{s:'Bar across upper traps, feet shoulder-width, toes slightly out.',h:'Push knees out over toes as you descend. Hit full depth if possible. Drive through full foot to stand.',f:'Quads, glutes, entire posterior chain.',e:'Don\'t let knees cave inward. Don\'t round lower back at the bottom. If you can\'t hit depth, work on hip and ankle mobility first.'},
  'Jump squat (bodyweight)':{s:'Feet shoulder-width. Immediately follows your heavy squat set.',h:'Quick dip to quarter squat then explode up as fast as possible. Land softly through toes then heel.',f:'Explosive quad contraction. Goal is maximum body speed not depth.',e:'Don\'t land stiff-legged. Absorb through hip, knee, and ankle. Every rep at max intent.'},
  'Bulgarian split squat':{s:'Rear foot elevated on bench, front foot stepped far forward.',h:'Lower back knee toward floor, keeping front shin relatively vertical. Drive through front heel to return.',f:'Front glute and quad.',e:'Don\'t let front knee track inward. Keep torso upright — leaning too far forward shifts load off the glute.'},
  'Romanian deadlift':{s:'Stand holding barbell at hip height, slight knee bend, feet hip-width.',h:'Hinge at hip, push hips back as bar slides down your thighs. Go until you feel a strong hamstring stretch. Drive hips forward to return.',f:'Hamstrings and glutes. NOT your lower back.',e:'Don\'t round your lower back. This is a hip hinge not a squat. Bar stays close to your body.'},
  'Nordic hamstring curl':{s:'Kneel on a pad, have someone hold your ankles or hook under a machine.',h:'Slowly lower your body toward the floor resisting with your hamstrings as long as possible. Catch with your hands. Push back up.',f:'Hamstrings under extreme eccentric load — the most effective hamstring injury prevention exercise.',e:'This is very hard. Even 10-15 degrees of controlled lowering is effective. Never sacrifice control for range.'},
  'Hip 90/90 transitions':{s:'Seated 90/90 position.',h:'Without using your hands, rotate hips so the back leg becomes the front leg. Fluid windshield-wiper motion.',f:'Active hip internal and external rotation.',e:'Work toward no hands. Using hands is fine to start but hands-free is the goal.'},
  'Single-leg press':{s:'One foot in center of leg press platform.',h:'Full range — knee comes toward chest at bottom. Drive through heel to full extension.',f:'Glute and quad of working leg.',e:'Don\'t let the knee cave inward. Push it out in line with your second toe.'},
  'Depth jumps':{s:'Box 12-18 inches high. Step off, land directly in front.',h:'Step off (don\'t jump). The moment your feet hit the ground, jump as high as possible. Ground contact under 0.2 seconds.',f:'Stretch-shortening cycle. Like a bouncing ball.',e:'Don\'t pause on landing. The whole point is the fast stretch-shortening. Pausing turns it into a squat jump.'},
  'Lateral bounds':{s:'Standing on one foot.',h:'Push off and bound laterally to the other foot. Stick the landing for 1 second before going back.',f:'Glute medius and abductors driving the push. Single-leg stability on landing.',e:'If you can\'t stick the landing, reduce the distance. Landing stability is the hockey-specific training.'},
  'Box jumps':{s:'Box 18-24 inches. Stand close, feet hip-width.',h:'Quick dip, swing arms, explode up. Land softly in a quarter squat on top. Step down — don\'t jump down.',f:'Explosive quad and glute contraction.',e:'Don\'t squat deep before jumping — quick dip and explode. If you are crashing onto the box it is too high.'},
  'Broad jumps':{s:'Standing, feet shoulder-width.',h:'Swing arms back, load hips, then explode forward and up simultaneously. Land with soft knees.',f:'Full posterior chain explosive extension.',e:'Swing your arms aggressively — arm drive adds significant distance.'},
  'Trap bar deadlift explosive':{s:'Trap bar at 60-65% of max.',h:'Drive the floor away as fast as possible. Maximum velocity every rep.',f:'Posterior chain explosive extension. Bar should move fast.',e:'If the bar is moving slowly it is too heavy. Goal is bar speed not weight.'},
  'Depth drop to sprint':{s:'Low box 6-12 inches. 10m sprint lane in front.',h:'Step off the box. The moment your feet hit, explode into a 10m sprint. Zero hesitation.',f:'Reactive first step — switching instantly from absorbing to exploding.',e:'Don\'t jump off the box. Step. The unplanned drop makes the sprint reaction truly reactive.'},
  'Flying 20m sprints':{s:'10m build-up zone then a 20m timed zone.',h:'Accelerate through the first 10m then hit maximum velocity through the 20m zone.',f:'Maximum leg turnover. You are training top speed not acceleration.',e:'Don\'t tense up at full speed. Sprinting fast requires relaxation especially in the face hands and shoulders.'},
  'Sled push':{s:'Light load for speed work. Hands on poles, lean into sled at about 45 degrees.',h:'Drive with full leg extension, fast turnover. Goal is velocity not grinding through heavy weight.',f:'Hip extension, powerful glute drive, fast foot contacts.',e:'Don\'t load it so heavy you are grinding. If form breaks in the first 10m it is too heavy.'},
  '3-cone drill':{s:'Three cones in an L-shape 5 yards apart.',h:'Sprint to first cone and back, then around outside of second and third cones in a figure-8 pattern.',f:'Explosive starts, sharp cuts, direction changes.',e:'Attack each cut aggressively. Decelerate INTO the cut not before it.'},
  'T-drill':{s:'Cones in a T-shape: start, 10 yards forward, 5 yards left, 5 yards right.',h:'Sprint forward, shuffle left, shuffle all the way right, shuffle back to center, backpedal to start.',f:'Multi-directional speed in all planes.',e:'Touch each cone. Stay facing forward the entire time during shuffles.'},
  '5-10-5 drill':{s:'Three cones in a line 5 yards apart.',h:'Start at middle cone. Sprint 5 yards right, touch. Sprint 10 yards left, touch. Sprint 5 yards right to finish.',f:'Sharp deceleration into each cut, explosive acceleration out.',e:'The cut is where you gain or lose time. Get low and plant hard.'},
  'Assault bike intervals':{s:'Set resistance to feel challenging at max effort.',h:'All-out effort during the work period — arms and legs both. Easy pedal during rest.',f:'Lungs burning by round 5-6. Anaerobic system working.',e:'It has to be max effort. Half-effort intervals train you to work at half speed.'},
  '30s sprint 90s walk':{s:'Track turf or road. Clear sprint zone.',h:'Sprint as hard as you can for 30 seconds. Walk for 90 seconds. One shift simulation.',f:'By round 5-6 breathing hard. Round 8 should be very challenging.',e:'Don\'t jog — sprint. This only works if effort mirrors game intensity.'},
  'Suicide runs':{s:'Lines at 5m 10m 15m 20m from start.',h:'Sprint to 5m touch back. 10m touch back. 15m touch back. 20m touch back. That is one round.',f:'Accumulating fatigue through repeated accelerations and decelerations.',e:'Touch every line. The deceleration and touch are where the sport-specific training happens.'},
  'Lateral shuffle burst':{s:'Athletic stance, ready position.',h:'Shuffle laterally 3-4 steps then explode into a 10m sprint.',f:'The transition from lateral to linear is pure hockey movement.',e:'The burst must be explosive — not a jog. Decelerate hard, plant, go.'},
  'Band pull-aparts':{s:'Hold resistance band at chest height, hands shoulder-width.',h:'Pull the band apart to your sides until it touches your chest. Squeeze shoulder blades together at the end.',f:'Rear delts and rhomboids — muscles shut off by desk work.',e:'Don\'t shrug your shoulders up. Keep them down and back throughout.'},
  'Face pulls':{s:'Cable at face height, rope attachment.',h:'Pull rope toward your face, flaring elbows out. External rotate at the end — hands end up by your ears.',f:'Rear delts and external rotators. The antidote to desk posture.',e:'Keep elbows high throughout. Dropping them turns it into a row.'},
  'Cable woodchop':{s:'Cable at high or low position. Stand sideways, both hands on handle.',h:'Rotate your torso to pull the cable across your body. Feet stay planted — rotate from hips and thoracic spine.',f:'Obliques and rotational core. Direct sport transfer for hockey.',e:'Don\'t just use your arms. Power comes from the hip rotation.'},
  'Slow eccentric calf raise':{s:'Stand on edge of a step, one foot.',h:'Raise up on both feet, shift to one foot, lower your heel down over 4 full seconds.',f:'Achilles tendon remodeling. Critical for concrete running.',e:'The 4 second lowering is the entire point — don\'t rush it.'},
  'Foam roll':{s:'Foam roller on the ground.',h:'Slow rolls on quads, IT band, glutes, calves. Pause and hold on tight spots for 5-10 seconds.',f:'Pressure and release in muscle tissue.',e:'Don\'t just roll fast. Slow with pauses on tight spots is far more effective.'}
};

var HIP=[
  {n:'90/90 hip stretch',d:'90s each side — sit tall, lean over front shin'},
  {n:'Kneeling hip flexor stretch',d:'90s each side — glute squeeze + posterior tilt FIRST'},
  {n:'Pigeon pose',d:'60s each side — breathe into it, stay relaxed'},
  {n:'Glute bridge 2s hold',d:'2x15 — ribs down, drive through heels'},
  {n:'Clamshell',d:'2x15 each side — don\'t let pelvis rock'},
  {n:'"World\'s greatest" stretch',d:'5 reps each side — slow and controlled'},
  {n:'Copenhagen adductor plank',d:'3x20s each side — groin tendon work NEW',tag:'new'},
  {n:'Isometric hip flexor hold',d:'3x20s each side — stand tall, knee at 90°',tag:'new'},
  {n:'Slow eccentric calf raises',d:'3x8 each side — 4 seconds down, Achilles tendon',tag:'new'}
];

var CORE=[
  {n:'Dead bug',d:'3x8/side — lower back FLAT into floor the entire time'},
  {n:'Hollow body hold',d:'3x20s building to 30s — lower back flat, never arch'},
  {n:'Bird dog',d:'3x8/side — 2s hold, keep hips perfectly level'},
  {n:'Posterior tilt plank',d:'2x20s — tuck pelvis first, quality over duration'}
];

var PH=[
{lb:'P1',fl:'Foundation',col:'#c8f060',
 wks:['Wk 1 · Mar 21','Wk 2 · Mar 28','Wk 3 · Apr 4'],
 days:[
  {ti:'Lower Body Strength',su:'Squat pattern · glute activation · tendon work',ty:'Strength',tc:'#c8f060',
   s:[{h:'Warmup',i:[
     {n:'90/90 hip stretch',d:'2x60s/side'},
     {n:'"World\'s greatest" stretch',d:'5 reps/side'},

   ]},{h:'Main Work',i:[
     {n:'Barbell back squat',d:'4x6 @ 70% — full depth, slow down'},

  {ti:'Speed & Agility',su:'First-step quickness · lateral shuffle',ty:'Speed',tc:'#60d4f0',

     {n:'Lateral bounds',d:'2x6/side — light and reactive'},
     {n:'"World\'s greatest" stretch',d:'5 reps/side'},

     {n:'Sled push',d:'6x20m — light load, full rest between each'},

  {ti:'Upper Body + Conditioning',su:'Integrated strength · rotational power · bike',ty:'Conditioning',tc:'#60d4f0',

     {n:'Assault bike intervals',d:'10 rounds — 20s all out / 40s easy'}

var DLBL=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var pi=0,wi=0,di=0;
var ST={};
try{ST=JSON.parse(localStorage.getItem('hpk3')||'{}')}catch(e){}
var OT={};

function save(){try{localStorage.setItem('hpk3',JSON.stringify(ST))}catch(e){}}
function K(p,w,d,s,i){return p+'|'+w+'|'+d+'|'+s+'|'+i}
function TK(id){return 't|'+id}

function getPct(p,w,d){
  var day=PH[p].days[d];
  if(day.rest)return 100;
  var tot=HIP.length+CORE.length,dn=0;
  for(var i=0;i<HIP.length;i++)if(ST[K(p,w,d,'h',i)])dn++;
  for(var i=0;i<CORE.length;i++)if(ST[K(p,w,d,'c',i)])dn++;
  for(var s=0;s<day.s.length;s++)for(var i=0;i<day.s[s].i.length;i++){tot++;if(ST[K(p,w,d,s,i)])dn++;}
  return tot?Math.round(dn/tot*100):0;
}

function getTotDone(p,w,d){
  var day=PH[p].days[d];
  var tot=HIP.length+CORE.length,dn=0;
  for(var i=0;i<HIP.length;i++)if(ST[K(p,w,d,'h',i)])dn++;
  for(var i=0;i<CORE.length;i++)if(ST[K(p,w,d,'c',i)])dn++;
  for(var s=0;s<day.s.length;s++)for(var i=0;i<day.s[s].i.length;i++){tot++;if(ST[K(p,w,d,s,i)])dn++;}
  return {tot:tot,dn:dn};
}

function tipHTML(name){
  var t=TIPS[name];if(!t)return '';
  var h='<div class="tinner">';
  if(t.s)h+='<div class="trow"><div class="tlbl">Setup</div><div class="ttxt">'+t.s+'</div></div>';
  if(t.h)h+='<div class="trow"><div class="tlbl">How</div><div class="ttxt">'+t.h+'</div></div>';
  if(t.f)h+='<div class="trow"><div class="tlbl">Feel</div><div class="ttxt">'+t.f+'</div></div>';
  if(t.e)h+='<div class="trow"><div class="tlbl err">Watch out</div><div class="ttxt">'+t.e+'</div></div>';
  h+='</div>';return h;
}

function buildItem(name,detail,ckKey,tag){
  var ck=ST[ckKey]?'ck':'';
  var hasTip=!!TIPS[name];
  var tid='tip-'+ckKey;
  var isOpen=OT[tid];
  var nb=tag==='new'?'<span class="new-badge">new</span>':'';
  var h='<div class="item '+ck+'" id="item-'+ckKey+'">';
  h+='<div class="itop" onclick="togCk(\''+ckKey+'\')">';
  h+='<div class="cbox">'+(ST[ckKey]?'✓':'')+'</div>';
  h+='<div class="imid"><div class="iname">'+name+nb+'</div><div class="idet">'+detail+'</div></div>';
  h+='</div>';
  if(hasTip){
    h+='<div class="tbtn'+(isOpen?' open':'')+'" id="'+tid+'" onclick="togTip(\''+tid+'\',\''+name+'\')">';
    h+=(isOpen?'▲ Hide form':'ℹ️ Form &amp; cues');
    h+='</div>';
    h+='<div class="tpanel'+(isOpen?' open':'')+'" id="tp-'+tid+'">'+(isOpen?tipHTML(name):'')+'</div>';
  }
  h+='</div>';
  return h;
}

function togCk(k){
  ST[k]=!ST[k];save();
  var el=document.getElementById('item-'+k);
  if(el){
    el.classList.toggle('ck',ST[k]);
    var cb=el.querySelector('.cbox');if(cb)cb.textContent=ST[k]?'✓':'';
    var nm=el.querySelector('.iname');if(nm)nm.style.textDecoration=ST[k]?'line-through':'none';
  }
  updProg();renderDays();
}

function togTip(tid,name){
  OT[tid]=!OT[tid];
  var btn=document.getElementById(tid);
  var panel=document.getElementById('tp-'+tid);
  if(btn){btn.classList.toggle('open',OT[tid]);btn.innerHTML=OT[tid]?'▲ Hide form':'ℹ️ Form &amp; cues';}
  if(panel){
    panel.classList.toggle('open',OT[tid]);
    if(OT[tid]&&!panel.innerHTML.trim())panel.innerHTML=tipHTML(name);
  }
}

function updProg(){
  var td=getTotDone(pi,wi,di);
  var p=getPct(pi,wi,di);
  var pb=document.getElementById('pb');if(pb)pb.style.width=p+'%';
  var pn=document.getElementById('pn');if(pn)pn.textContent=td.dn+'/'+td.tot;
  var db=document.getElementById('db');if(db)db.style.display=p===100?'block':'none';
}

function renderPTabs(){
  var h='';
  for(var i=0;i<PH.length;i++)h+='<div class="ptab'+(i===pi?' active':'')+'" onclick="setP('+i+')">'+PH[i].lb+': '+PH[i].fl+'</div>';
  document.getElementById('ptabs').innerHTML=h;
}

function renderWTabs(){
  var ph=PH[pi],h='';
  for(var i=0;i<ph.wks.length;i++)h+='<div class="wtab'+(i===wi?' active':'')+'" onclick="setW('+i+')">'+ph.wks[i]+'</div>';
  document.getElementById('wrow').innerHTML=h;
}

function renderDays(){
  var ph=PH[pi],h='';
  for(var i=0;i<ph.days.length;i++){
    var d=ph.days[i],p=getPct(pi,wi,i);
    var cls='daybtn'+(i===di?' active':'')+(d.rest?' rd':'')+((!d.rest&&p===100)?' done':'');
    var col=i===di&&!d.rest?'border-color:'+ph.col:'';
    h+='<div class="'+cls+'" onclick="'+(d.rest?'':'setD('+i+')')+'" style="'+col+'">';
    h+='<div class="dlbl" style="'+(i===di&&!d.rest?'color:'+ph.col:'')+'">'+DLBL[i]+'</div>';
    h+='<div class="dpct">'+(d.rest?'—':(p>0?p+'%':'·'))+'</div></div>';
  }
  document.getElementById('drow').innerHTML=h;
}

function renderSession(){
  var ph=PH[pi],day=ph.days[di],el=document.getElementById('sa');
  el.scrollTop=0;OT={};
  if(day.rest){
    el.innerHTML='<div class="rscreen"><div class="rico">'+(day.tourn?'🏒':'😴')+'</div><div class="rtitle">'+(day.tourn?'Tournament Day':'Rest Day')+'</div><div class="rbody">'+(day.tourn?'May 16, 2026. Everything you\'ve built leads to this. Sleep well, eat well, stay loose. You\'re ready.':'Sleep, eat, recover. Full rest is a required part of this plan — not a reward.')+'</div></div>';
    return;
  }
  var td=getTotDone(pi,wi,di);
  var p=getPct(pi,wi,di);
  var h='<div class="shdr">';
  h+='<div class="spill" style="color:'+day.tc+';border-color:'+day.tc+';background:'+day.tc+'18">'+day.ty+'</div>';
  h+='<div class="stitle">'+day.ti+'</div>';
  h+='<div class="ssub">'+day.su+'</div>';
  h+='<div class="prow"><div class="ptrack"><div class="pbar" id="pb" style="width:'+p+'%;background:'+ph.col+'"></div></div><div class="pnum" id="pn">'+td.dn+'/'+td.tot+'</div></div>';
  h+='</div>';
  h+='<div class="hnote">⚡ Hip reset + core first, every day. Tap ℹ️ on any exercise for form cues.</div>';

  h+='<div class="sec"><div class="sechdr">Morning Hip Reset + Tendon Work</div>';
  for(var i=0;i<HIP.length;i++)h+=buildItem(HIP[i].n,HIP[i].d,K(pi,wi,di,'h',i),HIP[i].tag);
  h+='</div>';

  h+='<div class="sec"><div class="sechdr">Daily Core</div>';
  for(var i=0;i<CORE.length;i++)h+=buildItem(CORE[i].n,CORE[i].d,K(pi,wi,di,'c',i),CORE[i].tag);
  h+='</div>';

  for(var s=0;s<day.s.length;s++){
    h+='<div class="sec"><div class="sechdr">'+day.s[s].h+'</div>';
    for(var ii=0;ii<day.s[s].i.length;ii++){
      var it=day.s[s].i[ii];
      h+=buildItem(it.n,it.d,K(pi,wi,di,s,ii),it.tag);
    }
    h+='</div>';
  }
  if(day.no)h+='<div class="cnote"><b>Coach:</b> '+day.no+'</div>';
  h+='<div class="dbanner" id="db" style="display:'+(p===100?'block':'none')+'">Session complete 🏒</div>';
  el.innerHTML=h;
}

function setP(i){pi=i;wi=0;di=0;renderPTabs();renderWTabs();renderDays();renderSession();}
function setW(i){wi=i;renderWTabs();renderDays();renderSession();}
function setD(i){di=i;renderDays();renderSession();}

// Auto-jump to today — plan starts March 21 2026
(function(){
  var start=new Date('2026-03-21'),now=new Date();
  var diff=Math.floor((now-start)/86400000);
  if(diff>=0&&diff<56){
    var tw=Math.floor(diff/7),dow=diff%7;
    if(tw<3){pi=0;wi=tw;}else if(tw<6){pi=1;wi=tw-3;}else{pi=2;wi=tw-6;}
    di=dow;
  }
})();

renderPTabs();renderWTabs();renderDays();renderSession();
</script>
